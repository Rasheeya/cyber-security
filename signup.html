<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">

<style>

</style>

</head>

<body class="auth-body">

<div class="signup-box">

<div class="logo"><img src="images/logo.webp" alt="Stackly" style="height: 42px; filter: brightness(0) invert(1) drop-shadow(0 0 5px #00d4ff); mix-blend-mode: screen; transition: all 0.3s ease;"></div>

<h4 class="text-center mb-4">Create Identity</h4>

<form>

<div class="row">

<div class="col-md-6 mb-3">
<label class="small">Full Name</label>
<input type="text" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="small">Email</label>
<input type="email" class="form-control" required>
</div>

</div>

<div class="mb-3">
<label class="small">Phone</label>
<input type="tel" class="form-control">
</div>

<div class="mb-3">
<label class="small">Join As</label>
<select class="form-select">
<option>Standard Account</option>
<option>Enterprise Client</option>
<option>Security Consultant</option>
</select>
</div>

<div class="mb-3">
<label class="small">Password</label>
<input type="password" class="form-control" required>
</div>

<div class="mb-3">
<label class="small">Confirm Password</label>
<input type="password" class="form-control" required>
</div>

<div class="mb-3 small">
<input type="checkbox" required> I accept Terms & Privacy
</div>

<button class="btn btn-cyber w-100 py-2">Create Account</button>

<p class="text-center mt-3 small">
Already have account? <a href="login.html">Log In</a>
</p>

</form>

</div>

<div class="mt-4 d-flex gap-3">
    <a href="404.html" class="btn-cyber-outline btn-sm text-decoration-none px-4"><i class="fa-solid fa-arrow-left me-2"></i>Go Back</a>
    <a href="404.html" class="btn-cyber-outline btn-sm text-decoration-none px-4"><i class="fa-solid fa-house me-2"></i>Back to Home</a>
</div>



    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
