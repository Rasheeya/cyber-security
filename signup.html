<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
min-height:100vh;
display:flex;
flex-direction: column;
align-items:center;
justify-content:center;
background:#0b0f19;
font-family:Inter;
color:white;
padding: 20px;
}

.signup-box{
width:100%;
max-width:500px;
padding:40px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:14px;
}

.logo{
font-family:Orbitron;
font-size:30px;
color:#00d4ff;
text-align:center;
margin-bottom:20px;
}

.form-control{
background:#121a2a;
border:1px solid #1e2a40;
color:white;
}

.form-control:focus{
border-color:#00d4ff;
box-shadow:0 0 10px #00d4ff55;
}

.btn-cyber{
background:#00d4ff;
border:none;
color:#00131a;
font-weight:600;
}

.btn-cyber:hover{
background:#00b3d6;
}

@media (max-width: 576px) {
    .signup-box {
        padding: 30px 20px;
    }
    .mt-4.d-flex {
        flex-direction: column;
        align-items: center;
        gap: 15px !important;
    }
    .mt-4.d-flex a {
        padding-right: 0 !important;
        width: 100%;
        text-align: center;
    }
}
</style>

</head>

<body>

<div class="signup-box">

<div class="logo"><img src="images/logo.webp" alt="Stackly" style="height: 42px; filter: brightness(0) invert(1) drop-shadow(0 0 5px #00d4ff); mix-blend-mode: screen; transition: all 0.3s ease;"></div>

<h4 class="text-center mb-4">Create Identity</h4>

<form>

<div class="row">

<div class="col-md-6 mb-3">
<label class="small">Full Name</label>
<input type="text" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label class="small">Email</label>
<input type="email" class="form-control" required>
</div>

</div>

<div class="mb-3">
<label class="small">Phone</label>
<input type="tel" class="form-control">
</div>

<div class="mb-3">
<label class="small">Join As</label>
<select class="form-control">
<option>Standard Account</option>
<option>Enterprise Client</option>
<option>Security Consultant</option>
</select>
</div>

<div class="mb-3">
<label class="small">Password</label>
<input type="password" class="form-control" required>
</div>

<div class="mb-3">
<label class="small">Confirm Password</label>
<input type="password" class="form-control" required>
</div>

<div class="mb-3 small">
<input type="checkbox" required> I accept Terms & Privacy
</div>

<button class="btn btn-cyber w-100 py-2">Create Account</button>

<p class="text-center mt-3 small">
Already have account? <a href="login.html">Login</a>
</p>

</form>

</div>

<div class="mt-4 d-flex gap-3 justify-content-center flex-wrap">
    <a href="javascript:history.back()" class="text-primary text-decoration-none fw-bold" style="font-size: 1.1rem; padding-right: 40px;"><i data-lucide="arrow-left" style="width:20px;height:20px;" class="me-2"></i> Go Back</a>

    <a href="index.html" class="text-primary text-decoration-none fw-bold" style="font-size: 1.1rem;"><i data-lucide="home" style="width:20px;height:20px;" class="me-2"></i> Back to Home</a>
</div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
