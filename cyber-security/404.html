<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Access Denied | CyberGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"><link rel="stylesheet" href="css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05080f;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .glitch-box {
            position: relative;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary-glow);
            margin-bottom: 0;
            line-height: 1;
        }

        .error-message {
            font-size: 1.5rem;
            color: var(--text-dim);
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .cyber-alert {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 4px;
            margin-bottom: 30px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glitch-box">
        <div class="cyber-alert"><i data-lucide="alert-triangle"></i> Protocol Error: Access Denied</div>
        <h1 class="error-code cyber-font">404</h1>
        <p class="error-message">Route Decentralized</p>
        <p class="text-dim mb-5">The data packet you are looking for has been purged or never existed in our mainframe.</p>
        <a href="index.html" class="btn-cyber text-decoration-none">Back to Global Core</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
