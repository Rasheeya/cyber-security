<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infiltrate | Log In | CyberGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"><link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 10% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 40%), var(--bg-dark);
            padding: 20px;
        }

        .login-box {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
        }

        .auth-logo {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }

        .form-control {
            background: var(--bg-accent) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
            padding: 12px 15px;
        }

        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 10px var(--primary-glow) !important;
        }

        .social-auth {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }

        .social-btn {
            width: 40px;
            height: 40px;
            background: var(--bg-accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: var(--transition);
            border: 1px solid var(--glass-border);
            text-decoration: none;
        }

        .social-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="login-box glass shadow-lg" data-aos="zoom-in">
        <a href="index.html" class="auth-logo">CYBER<span>GUARD</span></a>
        <h3 class="mb-4">Secure Authentication</h3>
        <p class="text-dim mb-4 small">Infiltrate the console using your secure credentials.</p>
        
        <form>
            <div class="mb-3 text-start">
                <label class="mb-2 small fw-bold">Identification (Email)</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-secondary border-end-0 border-secondary"><i data-lucide="mail" style="width:16px;"></i></span>
                    <input type="email" class="form-control border-start-0 ps-0" placeholder="user@domain.com" required>
                </div>
            </div>
            <div class="mb-4 text-start">
                <label class="mb-2 small fw-bold">Access Code (Password)</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-secondary border-end-0 border-secondary"><i data-lucide="lock" style="width:16px;"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" placeholder="************" required>
                </div>
            </div>
            <div class="d-flex justify-content-between mb-4 small">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label text-dim" for="remember">Remember Session</label>
                </div>
                <a href="javascript:void(0)" class="text-primary text-decoration-none">Forgotten ID?</a>
            </div>
            <button type="submit" class="btn-cyber w-100 py-3 mb-4">Authorize Access</button>
            <p class="text-dim small">New operative? <a href="signup.html" class="text-primary text-decoration-none fw-bold">Register Identity</a></p>
        </form>

        <div class="social-auth">
            <a href="javascript:void(0)" class="social-btn"><i class="fa-brands fa-github"></i></a>
            <a href="javascript:void(0)" class="social-btn"><i class="fa-brands fa-x-twitter"></i></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        lucide.createIcons();
    </script>
</body>
</html>
