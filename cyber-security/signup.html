<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | Join Operative | CyberGuard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"><link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.05) 0%, transparent 100%), var(--bg-dark);
            padding: 20px;
        }

        .signup-box {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            border-radius: 12px;
        }

        .auth-logo {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 20px;
            display: block;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
        }

        .form-control {
            background: var(--bg-accent) !important;
            border: 1px solid var(--glass-border) !important;
            color: white !important;
        }

        .form-control:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 10px var(--primary-glow) !important;
        }

        .password-strength {
            height: 4px;
            background: var(--glass-border);
            margin-top: 10px;
            border-radius: 2px;
        }

        .password-strength div {
            height: 100%;
            width: 50%;
            background: var(--primary);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="signup-box glass shadow-lg" data-aos="fade-up">
        <a href="index.html" class="auth-logo">CYBER<span>GUARD</span></a>
        <h4 class="mb-4">New Operative <span class="text-primary">Induction</span></h4>
        
        <form>
            <div class="row text-start">
                <div class="col-md-6 mb-3">
                    <label class="mb-2 small fw-bold">Codename</label>
                    <input type="text" class="form-control" placeholder="Identity name" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="mb-2 small fw-bold">Email ID</label>
                    <input type="email" class="form-control" placeholder="user@domain.com" required>
                </div>
            </div>
            
            <div class="mb-3 text-start">
                <label class="mb-2 small fw-bold">Encryption Key (Password)</label>
                <input type="password" class="form-control" placeholder="************" required>
                <div class="password-strength"><div></div></div>
                <p class="text-dim extra-small mt-1" style="font-size: 0.7rem;">Complexity Level: Medium Resilience</p>
            </div>
            <div class="mb-4 text-start">
                <label class="mb-2 small fw-bold">Confirm Key</label>
                <input type="password" class="form-control" placeholder="************" required>
            </div>

            <div class="mb-4 text-start small">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label text-dim" for="terms">I agree to the <a href="javascript:void(0)" class="text-primary text-decoration-none">Terms of Infiltration</a> and Data Protocols.</label>
                </div>
            </div>

            <button type="submit" class="btn-cyber w-100 py-3 mb-4">Initialize Identity</button>

            <p class="text-dim small">Already an operative? <a href="login.html" class="text-primary text-decoration-none fw-bold">Establish Session</a></p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        lucide.createIcons();
    </script>
</body>
</html>
