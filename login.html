<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">

<style>

body{
min-height:100vh;
display:flex;
flex-direction: column;
align-items:center;
justify-content:center;
background:#0b0f19;
font-family:Inter;
color:white;
padding: 20px;
}

.login-box{
width:100%;
max-width:450px;
padding:40px;
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border-radius:14px;
}

.logo{
font-family:Orbitron;
font-size:30px;
color:#00d4ff;
text-align:center;
margin-bottom:20px;
}

.form-control{
background:#121a2a;
border:1px solid #1e2a40;
color:white;
}

.form-control:focus{
border-color:#00d4ff;
box-shadow:0 0 10px #00d4ff55;
}

.btn-cyber{
background:#00d4ff;
border:none;
color:#00131a;
font-weight:600;
}

.btn-cyber:hover{
background:#00b3d6;
}

@media (max-width: 576px) {
    .login-box {
        padding: 30px 20px;
    }
    .mt-4.d-flex {
        flex-direction: column;
        align-items: center;
        gap: 15px !important;
    }
    .mt-4.d-flex a {
        padding-right: 0 !important;
        width: 100%;
        text-align: center;
    }
}
</style>
</head>

<body>

<div class="login-box">

<div class="logo"><img src="images/logo.webp" alt="Stackly" style="height: 42px; filter: brightness(0) invert(1) drop-shadow(0 0 5px #00d4ff); mix-blend-mode: screen; transition: all 0.3s ease;"></div>

<h4 class="text-center mb-4">Secure Login</h4>

<form>

<div class="mb-3">
<label class="small mb-1">Login As</label>
<select class="form-control">
<option>Corporate Client</option>
<option>Security Analyst</option>
<option>Admin</option>
</select>
</div>

<div class="mb-3">
<label class="small mb-1">Email</label>
<input type="email" class="form-control" placeholder="user@domain.com" required>
</div>

<div class="mb-3">
<label class="small mb-1">Password</label>
<input type="password" class="form-control" placeholder="********" required>
</div>

<div class="d-flex justify-content-between small mb-3">
<div>
<input type="checkbox"> Remember
</div>
<a href="404.html">Forgot password?</a>
</div>

<button class="btn btn-cyber w-100 py-2">Login</button>

<p class="text-center mt-3 small">
New user? <a href="signup.html">Create account</a>
</p>

</form>

</div>

<div class="mt-4 d-flex gap-3 justify-content-center flex-wrap">
    <a href="javascript:history.back()" class="text-primary text-decoration-none fw-bold" style="font-size: 1.1rem; padding-right: 40px;"><i data-lucide="arrow-left" style="width:20px;height:20px;" class="me-2"></i> Go Back</a>

    <a href="index.html" class="text-primary text-decoration-none fw-bold" style="font-size: 1.1rem;"><i data-lucide="home" style="width:20px;height:20px;" class="me-2"></i> Back to Home</a>
</div>


    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'admin.html';
        });
    </script>
</body>
</html>
