<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stackly</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<body class="auth-body">

<div class="login-box">

<div class="logo"><img src="images/logo.webp" alt="Stackly" style="height: 42px; filter: brightness(0) invert(1) drop-shadow(0 0 5px #00d4ff); mix-blend-mode: screen; transition: all 0.3s ease;"></div>

<h4 class="text-center mb-4">Secure Log In</h4>

<form>

<div class="mb-3">
<label class="small mb-1">Log In As</label>
<select class="form-select">
<option>Corporate Client</option>
<option>Security Analyst</option>
<option>Admin</option>
</select>
</div>

<div class="mb-3">
<label class="small mb-1">Email</label>
<input type="email" class="form-control" placeholder="user@domain.com" required>
</div>

<div class="mb-3">
<label class="small mb-1">Password</label>
<input type="password" class="form-control" placeholder="********" required>
</div>

<div class="d-flex justify-content-between small mb-3">
<div>
<input type="checkbox"> Remember
</div>
<a href="404.html">Forgot password?</a>
</div>

<button class="btn btn-cyber w-100 py-2">Log In</button>

<p class="text-center mt-3 small">
New user? <a href="signup.html">Create account</a>
</p>

</form>

</div>

<div class="mt-4 d-flex gap-3">
    <a href="404.html" class="btn-cyber-outline btn-sm text-decoration-none px-4"><i class="fa-solid fa-arrow-left me-2"></i>Go Back</a>
    <a href="404.html" class="btn-cyber-outline btn-sm text-decoration-none px-4"><i class="fa-solid fa-house me-2"></i>Back to Home</a>
</div>




    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'admin.html';
        });
    </script>
</body>
</html>
